<!DOCTYPE html>
<html>
    <head>

        <title> picture tag</title>
    </head>
    <body>
        <!-- picture element-->
         <picture>
            <!--large screens-->
            <source media="(min-width:1200px)" srcset="htt://via.placeholder.com/1200x800">
                <!--mediam screens-->
            <source media="(min-width:760px)" srcset="htt://via.placeholder.com/760x512">
                <!--small screens-->
            <source media="(min-width:480px)" srcset="htt://via.placeholder.com/480x320">
            <img src="https/via.placeholder.com/400x300">
         </picture>
    </body>
</html>
